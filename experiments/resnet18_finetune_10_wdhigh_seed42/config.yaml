experiment:
  name: resnet18_finetune_10_wdhigh_seed42
  description: L2 ablation. Full fine-tuning on 10% data, weight_decay=5e-3 (50x baseline).
    Pair with finetune_10 (wd=1e-4).
  seed: 42
data:
  dataset: OxfordIIITPet
  train_split: train_10_seed42
  val_split: val_seed42
  test_split: official_test
  image_size: 224
  use_augmentation: true
  use_oversampling: false
  use_weighted_loss: false
model:
  architecture: resnet18
  pretrained: true
  num_classes: 37
  strategy: full_finetuning
  unfrozen_layers: all
training:
  epochs: 30
  batch_size: 64
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.005
  num_workers: 2
logging:
  output_dir: experiments/resnet18_finetune_10_wdhigh_seed42
  save_best_checkpoint: true
