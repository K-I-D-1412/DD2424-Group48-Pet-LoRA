experiment:
  name: resnet18_linear_probe_100_seed42
  description: Linear probing on ResNet-18 using 100% of the training data.
  seed: 42
data:
  dataset: OxfordIIITPet
  train_split: train_100_seed42
  val_split: val_seed42
  test_split: official_test
  image_size: 224
  use_augmentation: true
  use_oversampling: false
  use_weighted_loss: false
model:
  architecture: resnet18
  pretrained: true
  num_classes: 37
  strategy: linear_probe
  freeze_backbone: true
training:
  epochs: 20
  batch_size: 64
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0001
evaluation:
  metrics:
  - top1_accuracy
  - macro_f1
  - per_class_accuracy
  - per_class_f1
logging:
  output_dir: experiments/resnet18_linear_probe_100_seed42
  save_best_checkpoint: true
  save_training_curves: true
