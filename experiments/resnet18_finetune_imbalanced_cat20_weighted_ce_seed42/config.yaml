experiment:
  name: resnet18_finetune_imbalanced_cat20_weighted_ce_seed42
  description: Fine-tuning on cat20 imbalanced split with weighted cross-entropy.
  seed: 42
data:
  dataset: OxfordIIITPet
  train_split: train_imbalanced_cat20_seed42
  val_split: val_seed42
  test_split: official_test
  image_size: 224
  use_augmentation: true
  use_oversampling: false
  use_weighted_loss: true
model:
  architecture: resnet18
  pretrained: true
  num_classes: 37
  strategy: full_finetuning
  freeze_backbone: false
  unfrozen_layers: all
training:
  epochs: 30
  batch_size: 64
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
evaluation:
  metrics:
  - top1_accuracy
  - macro_f1
  - per_class_accuracy
  - per_class_f1
  - confusion_matrix
logging:
  output_dir: experiments/resnet18_finetune_imbalanced_cat20_weighted_ce_seed42
  save_best_checkpoint: true
  save_training_curves: true
