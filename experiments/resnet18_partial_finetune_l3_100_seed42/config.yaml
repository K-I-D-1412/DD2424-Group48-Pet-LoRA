experiment:
  name: resnet18_partial_finetune_l3_100_seed42
  description: Strategy 1, fine-tune last 3 blocks (fc + layer4 + layer3) on 100%
    training data.
  seed: 42
data:
  dataset: OxfordIIITPet
  train_split: train_100_seed42
  val_split: val_seed42
  test_split: official_test
  image_size: 224
  use_augmentation: true
  use_oversampling: false
  use_weighted_loss: false
model:
  architecture: resnet18
  pretrained: true
  num_classes: 37
  strategy: partial_finetune
  unfrozen_layers: 3
training:
  epochs: 30
  batch_size: 64
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 2
logging:
  output_dir: experiments/resnet18_partial_finetune_l3_100_seed42
  save_best_checkpoint: true
