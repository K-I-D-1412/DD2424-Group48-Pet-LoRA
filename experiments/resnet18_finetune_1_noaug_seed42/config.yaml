experiment:
  name: resnet18_finetune_1_noaug_seed42
  description: Aug ablation. Full fine-tuning on 1% data, augmentation OFF. Overfitting
    should be most severe here.
  seed: 42
data:
  dataset: OxfordIIITPet
  train_split: train_1_seed42
  val_split: val_seed42
  test_split: official_test
  image_size: 224
  use_augmentation: false
  use_oversampling: false
  use_weighted_loss: false
model:
  architecture: resnet18
  pretrained: true
  num_classes: 37
  strategy: full_finetuning
  unfrozen_layers: all
training:
  epochs: 30
  batch_size: 64
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 2
logging:
  output_dir: experiments/resnet18_finetune_1_noaug_seed42
  save_best_checkpoint: true
